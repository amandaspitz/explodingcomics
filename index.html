  <body id="explodingSite">
    <div class="fullPage">
      <header>
        <div class="logo">
          <img
            id="siteLogo"
            src="assets/images/logodarkmode4x.png"
            data-dark-src="assets/images/logodarkmode4x.png"
            data-light-src="assets/images/logo.png"
            alt="Exploding Comics Logo"
            title="Exploding Comics"
          />
        </div>
        <div class="titleMenu" id="topText">COMICS EVERY MONDAY</div>
      </header>

      <div class="flag">
        <div class="customSelect" id="issueSelector">
          <button
            id="issueSelectorButton"
            class="issueSelectorTrigger"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="issueSelectorMenu"
          >
            <span id="issueSelectorValue"></span>
            <svg class="issueSelectorChevron" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5"></path>
            </svg>
          </button>
          <div
            id="issueSelectorMenu"
            class="issueSelectorMenu"
            role="listbox"
            aria-label="Choose comic"
            aria-hidden="true"
          ></div>
        </div>
        <button id="themeToggle" type="button" aria-label="Switch to light mode" title="Light mode">
            <svg class="themeIcon themeSun" aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4.25"></circle>
              <rect x="11.25" y="1.5" width="1.5" height="4" rx=".75"></rect>
              <rect x="11.25" y="18.5" width="1.5" height="4" rx=".75"></rect>
              <rect x="18.5" y="11.25" width="4" height="1.5" rx=".75"></rect>
              <rect x="1.5" y="11.25" width="4" height="1.5" rx=".75"></rect>
              <rect x="16.87" y="4.04" width="1.5" height="4" rx=".75" transform="rotate(45 17.62 6.04)"></rect>
              <rect x="5.63" y="15.28" width="1.5" height="4" rx=".75" transform="rotate(45 6.38 17.28)"></rect>
              <rect x="15.96" y="16.87" width="4" height="1.5" rx=".75" transform="rotate(45 17.96 17.62)"></rect>
              <rect x="4.04" y="5.63" width="4" height="1.5" rx=".75" transform="rotate(45 6.04 6.38)"></rect>
            </svg>
            <svg class="themeIcon themeMoon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 14.2A8.95 8.95 0 0 1 9.8 3a.55.55 0 0 0-.69.69A7.4 7.4 0 1 0 20.31 14.9a.55.55 0 0 0 .69-.7Z"></path>
            </svg>
        </button>
        <button id="toggleLanguage" type="button" aria-label="Switch language" title="Switch language"><img id="bandeirinha" src="assets/images/flag-uk.png"></button>
      </div>

      <div class="comicStrip">
        <img
          src="assets/comics/eng/0001.jpg"
          alt="Comic Strip"
          title="Comic Strip"
          id="imageCarousel"
        />
      </div>
      <div class="menu">
        <a href="#" class="control" id="first">FIRST</a>
        <a href="#" class="control" id="previous">PREVIOUS</a>
        <a href="#" class="control" id="random">RANDOM</a>
        <a href="#" class="control" id="next">NEXT</a>
        <a href="#" class="control" id="last">LAST</a>
      </div>
      <div class="blog">
        <p class="weeklyBlog" id="blog-text"></p>
      </div>
      <footer>
        <a
          href="https://www.instagram.com/explodingcomics/"
          target="_blank"
          class="iconFoot"
          ><img
            src="assets/images/instagram.svg"
            alt="Instagram"
            title="Instagram"
        /></a>
        <a
          href="https://github.com/amandaspitz"
          target="_blank"
          class="iconFoot"
          ><img src="assets/images/github.svg" alt="Github" title="Github"
        /></a>
        <a
          href="https://link.mercadopago.com.br/explodingcomics"
          target="_blank"
          class="iconFoot"
        >
          <img src="assets/images/pix.svg" alt="Pix" title="Pix"
        /></a>
        <a
          href="https://linktr.ee/explodingcomics"
          target="_blank"
          class="iconFoot"
          ><img
            src="assets/images/linktree.svg"
            alt="Linktree"
            title="Linktree"
        /></a>
        <div class="shareWrap" id="shareWrap">
          <button
            id="shareButton"
            type="button"
            class="iconFoot iconFootButton"
            aria-label="Share"
            title="Share"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="shareMenu"
          >
            <img src="assets/images/share.svg" alt="Share" title="Share" />
          </button>
          <div
            id="shareMenu"
            class="shareMenuPanel"
            aria-hidden="true"
          >
            <a
              id="shareWhatsApp"
              class="shareMenuItem"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              WhatsApp
            </a>
            <a
              id="shareFacebook"
              class="shareMenuItem"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              Facebook
            </a>
            <a
              id="shareTwitter"
              class="shareMenuItem"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              X
            </a>
            <a
              id="shareLinkedIn"
              class="shareMenuItem"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              LinkedIn
            </a>
            <button id="copyShareLink" type="button" class="shareMenuItem">
              Copy link
            </button>
          </div>
        </div>
        <a
          href="https://www.facebook.com/explodingcomics"
          target="_blank"
          class="iconFoot"
          ><img
            src="assets/images/facebook.svg"
            alt="Facebook"
            title="Facebook"
        /></a>
      </footer>
    </div>
    <div class="numbFloat">
      <div class="bothFloat">
        <span class="issueNumber" id="numberStrip">#1</span>
        <span class="comicStripName" id="nameStrip">Comicstrip name</span>
      </div>
    </div>
  </body>
